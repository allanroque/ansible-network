---
# =============================================================================
# Arista EOS | Syslog (idempotente - resource module)
# Uso: ansible-playbook playbooks/arista/syslog.yml
# =============================================================================
- name: "Arista | configurar Syslog servers"
  hosts: arista
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    _syslog_servers_list: >-
      {{ (syslog_servers | from_yaml | default([])) if (syslog_servers is string) else syslog_servers }}

  tasks:
    - name: "Arista | Syslog hosts (eos_logging_global - idempotente)"
      arista.eos.eos_logging_global:
        config:
          hosts: "{{ _syslog_servers_list | map('community.general.dict_kv', 'name') | list }}"
        state: merged
      register: _result

    - name: "Arista | info | Syslog aplicado"
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}  ({{ 'ALTERADO' if _result.changed else 'ja estava' }})"
          - "Syslog servers: {{ _syslog_servers_list }}"
