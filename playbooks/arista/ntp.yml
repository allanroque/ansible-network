---
# =============================================================================
# Arista EOS | NTP (idempotente - resource module)
# Uso: ansible-playbook playbooks/arista/ntp.yml
# =============================================================================
- name: "Arista | configurar NTP servers"
  hosts: arista
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    _ntp_servers_list: >-
      {{ (ntp_servers | from_yaml | default([])) if (ntp_servers is string) else ntp_servers }}

  tasks:
    - name: "Arista | NTP servers (eos_ntp_global - idempotente)"
      arista.eos.eos_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      register: _result

    - name: "Arista | info | NTP aplicado"
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}  ({{ 'ALTERADO' if _result.changed else 'ja estava' }})"
          - "NTP servers: {{ _ntp_servers_list }}"
