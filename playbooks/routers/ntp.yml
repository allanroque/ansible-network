---
# =============================================================================
# Routers | NTP multi-vendor (idempotente - resource modules)
# Uso: ansible-playbook playbooks/routers/ntp.yml
#      ansible-playbook playbooks/routers/ntp.yml --limit dc3
# =============================================================================
- name: "Routers | configurar NTP (multi-vendor)"
  hosts: routers
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    # Survey no Controller envia textarea como string; vars_files já define lista
    _ntp_servers_list: >-
      {{ (ntp_servers | from_yaml | default([])) if (ntp_servers is string) else ntp_servers }}

  tasks:
    - name: "Cisco IOS | NTP (ios_ntp_global)"
      cisco.ios.ios_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when: ansible_network_os == 'ios'
      register: _r_ios

    - name: "Arista EOS | NTP (eos_ntp_global)"
      arista.eos.eos_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when: ansible_network_os == 'eos'
      register: _r_eos

    # junos_config exige netconf; para SSH CLI (user/senha) use cli_config + network_cli.
    - name: "Juniper Junos | NTP (cli_config via network_cli)"
      ansible.netcommon.cli_config:
        config: "{{ _ntp_servers_list | map('regex_replace', '^(.*)$', 'set system ntp server \\1') | join('\n') }}"
        commit: true
      vars:
        ansible_connection: network_cli
      when: ansible_network_os == 'junos'
      register: _r_junos

    - name: "Routers | info | NTP aplicado"
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }} ({{ ansible_network_os }})  ({{ 'ALTERADO' if ([_r_ios, _r_eos, _r_junos] | selectattr('changed','defined') | selectattr('changed') | list | length > 0) else 'ja estava' }})"
          - "NTP servers: {{ _ntp_servers_list }}"
