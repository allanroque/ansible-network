---
# =============================================================================
# Routers | NTP multi-vendor (idempotente - resource modules)
# Uso: ansible-playbook playbooks/routers/ntp.yml
#      ansible-playbook playbooks/routers/ntp.yml --limit dc3
# =============================================================================
- name: "Routers | configurar NTP (multi-vendor)"
  hosts: routers
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    # Survey no Controller envia textarea como string; vars_files já define lista
    _ntp_servers_list: >-
      {{ (ntp_servers | from_yaml | default([])) if (ntp_servers is string) else ntp_servers }}

  tasks:
    - name: "Cisco IOS | NTP (ios_ntp_global)"
      cisco.ios.ios_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when: ansible_network_os == 'ios'
      register: _r_ios

    - name: "Arista EOS | NTP (eos_ntp_global)"
      arista.eos.eos_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when: ansible_network_os == 'eos'
      register: _r_eos

    # NETCONF/SSH só publickey: sem PEM valida o modulo falha — por defeito o job nao quebra (ignore_errors).
    # Inventario: juniper_ntp_netconf_strict=true para falhar o play neste host; juniper_skip_ntp=true para pular.
    - name: "Juniper Junos | NTP (junos_ntp_global / netconf)"
      junipernetworks.junos.junos_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when:
        - ansible_network_os == 'junos'
        - not (juniper_skip_ntp | default(false) | bool)
      register: _r_junos
      ignore_errors: "{{ not (juniper_ntp_netconf_strict | default(false) | bool) }}"

    - name: "Juniper Junos | aviso NETCONF (auth / PEM)"
      ansible.builtin.debug:
        msg:
          - "NETCONF NTP nao aplicado em {{ inventory_hostname }} (ex.: BadAuthenticationType / so publickey)."
          - "Corrija: credencial Machine com SSH Private Key (PEM) + usuario Junos, ou ansible_ssh_private_key_file no inventario."
          - "Para falhar o job aqui: juniper_ntp_netconf_strict=true. Para nao tentar NTP: juniper_skip_ntp=true."
      when:
        - ansible_network_os == 'junos'
        - not (juniper_skip_ntp | default(false) | bool)
        - _r_junos.failed | default(false)

    - name: "Juniper Junos | NTP omitido (juniper_skip_ntp=true no inventario)"
      ansible.builtin.debug:
        msg: "NTP Junos omitido em {{ inventory_hostname }} (juniper_skip_ntp=true)."
      when:
        - ansible_network_os == 'junos'
        - juniper_skip_ntp | default(false) | bool
      register: _r_junos

    - name: "Routers | info | NTP aplicado"
      ansible.builtin.debug:
        msg:
          - >-
            Host: {{ inventory_hostname }} ({{ ansible_network_os }})  ({{
              'ALTERADO' if ([_r_ios | default({}), _r_eos | default({}), _r_junos | default({})]
              | selectattr('changed', 'defined') | selectattr('changed') | list | length > 0)
              else (
                'NETCONF/auth nao aplicado (ver PEM ou juniper_ntp_netconf_strict)'
                if (ansible_network_os == 'junos' and (_r_junos.failed | default(false)))
                else 'ja estava'
              )
            }})
          - "NTP servers: {{ _ntp_servers_list }}"
