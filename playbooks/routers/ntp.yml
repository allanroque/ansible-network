---
# =============================================================================
# Routers | NTP multi-vendor (idempotente - resource modules)
# Uso: ansible-playbook playbooks/routers/ntp.yml
#      ansible-playbook playbooks/routers/ntp.yml --limit dc3
# =============================================================================
- name: "Routers | configurar NTP (multi-vendor)"
  hosts: routers
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    # Survey no Controller envia textarea como string; vars_files já define lista
    _ntp_servers_list: >-
      {{ (ntp_servers | from_yaml | default([])) if (ntp_servers is string) else ntp_servers }}

  tasks:
    - name: "Cisco IOS | NTP (ios_ntp_global)"
      cisco.ios.ios_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when: ansible_network_os == 'ios'
      register: _r_ios

    - name: "Arista EOS | NTP (eos_ntp_global)"
      arista.eos.eos_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when: ansible_network_os == 'eos'
      register: _r_eos

    # NETCONF usa SSH; se o Junos anunciar apenas publickey, e obrigatorio PEM (credencial ou inventario).
    - name: "Juniper Junos | checagem chave SSH para NETCONF"
      ansible.builtin.assert:
        that:
          - (_junos_ssh_key | length) > 0
        fail_msg: >-
          Junos {{ inventory_hostname }}: SSH aceitou apenas publickey (BadAuthenticationType).
          Inclua a chave privada PEM na credencial Machine do Job Template (campo SSH Private Key)
          ou defina ansible_ssh_private_key_file no inventario (grupo juniper / host).
          Senha sozinha nao autentica nesse modo; o config do modulo abaixo esta correto — falha e na camada SSH.
      vars:
        _junos_ssh_key: "{{ ansible_ssh_private_key_file | default(ansible_private_key_file | default('', true), true) }}"
      when:
        - ansible_network_os == 'junos'
        - not (juniper_skip_ntp | default(false) | bool)

    - name: "Juniper Junos | NTP (junos_ntp_global / netconf)"
      junipernetworks.junos.junos_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      when:
        - ansible_network_os == 'junos'
        - not (juniper_skip_ntp | default(false) | bool)
      register: _r_junos

    - name: "Juniper Junos | NTP omitido (juniper_skip_ntp=true no inventario)"
      ansible.builtin.debug:
        msg: "NTP Junos omitido em {{ inventory_hostname }} (juniper_skip_ntp=true)."
      when:
        - ansible_network_os == 'junos'
        - juniper_skip_ntp | default(false) | bool
      register: _r_junos

    - name: "Routers | info | NTP aplicado"
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }} ({{ ansible_network_os }})  ({{ 'ALTERADO' if ([_r_ios | default({}), _r_eos | default({}), _r_junos | default({})] | selectattr('changed', 'defined') | selectattr('changed') | list | length > 0) else 'ja estava' }})"
          - "NTP servers: {{ _ntp_servers_list }}"
