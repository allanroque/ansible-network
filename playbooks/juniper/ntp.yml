---
# =============================================================================
# Juniper Junos | NTP (idempotente - resource module)
# Uso: ansible-playbook playbooks/juniper/ntp.yml
# =============================================================================
- name: "Juniper | configurar NTP servers"
  hosts: juniper
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    _ntp_servers_list: >-
      {{ (ntp_servers | from_yaml | default([])) if (ntp_servers is string) else ntp_servers }}

  tasks:
    - name: "Juniper | NTP servers (cli_config via network_cli)"
      ansible.netcommon.cli_config:
        config: "{{ _ntp_servers_list | map('regex_replace', '^(.*)$', 'set system ntp server \\1') | join('\n') }}"
        commit: true
      vars:
        ansible_connection: network_cli
      register: _result

    - name: "Juniper | info | NTP aplicado"
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}  ({{ 'ALTERADO' if _result.changed else 'ja estava' }})"
          - "NTP servers: {{ _ntp_servers_list }}"
