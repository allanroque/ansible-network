---
# =============================================================================
# Juniper Junos | NTP (idempotente - resource module)
# Uso: ansible-playbook playbooks/juniper/ntp.yml
# =============================================================================
- name: "Juniper | configurar NTP servers"
  hosts: juniper
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    _ntp_servers_list: >-
      {{ (ntp_servers | from_yaml | default([])) if (ntp_servers is string) else ntp_servers }}

  tasks:
    - name: "Juniper | NTP servers (junos_ntp_global / netconf)"
      junipernetworks.junos.junos_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      register: _result
      when: not (juniper_skip_ntp | default(false) | bool)
      ignore_errors: "{{ not (juniper_ntp_netconf_strict | default(false) | bool) }}"

    - name: "Juniper | aviso NETCONF (auth / PEM)"
      ansible.builtin.debug:
        msg:
          - "NETCONF NTP nao aplicado (auth). PEM na credencial ou inventario; juniper_ntp_netconf_strict=true para falhar o job."
      when:
        - not (juniper_skip_ntp | default(false) | bool)
        - _result.failed | default(false)

    - name: "Juniper | NTP omitido (juniper_skip_ntp=true)"
      ansible.builtin.debug:
        msg: "NTP omitido (juniper_skip_ntp=true)."
      when: juniper_skip_ntp | default(false) | bool
      register: _result

    - name: "Juniper | info | NTP aplicado"
      ansible.builtin.debug:
        msg:
          - >-
            Host: {{ inventory_hostname }}  ({{
              'ALTERADO' if (_result.changed | default(false))
              else ('NETCONF/auth nao aplicado' if (_result.failed | default(false)) else 'ja estava')
            }})
          - "NTP servers: {{ _ntp_servers_list }}"
