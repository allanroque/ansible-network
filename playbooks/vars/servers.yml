---
# =============================================================================
# Variaveis compartilhadas pelos playbooks (NTP / Syslog / SNMP / Banner)
# =============================================================================
# Como usar:
#   vars_files:
#     - ../vars/servers.yml
#
# Override via CLI (lista JSON) ou survey no AAP (string YAML multilinha):
#   ansible-playbook playbooks/cisco/ntp.yml \
#     -e 'ntp_servers=["10.20.0.1","10.20.0.2"]'
#   Os playbooks NTP/Syslog convertem string YAML em lista (from_yaml).
#
# Junos (NETCONF/SSH) só com publickey:
#   Credencial Machine: "SSH Private Key" (PEM) + usuario correto no Junos.
#   juniper_skip_ntp: true — nao executa NTP no Junos.
#   juniper_ntp_netconf_strict: true — falha o job se NETCONF/auth quebrar (default: false, ignora erro).
# =============================================================================

# --- NTP ---
ntp_servers:
  - 10.10.0.200
  - 10.10.0.201
  - 10.10.0.202

# --- Syslog ---
syslog_servers:
  - 10.10.0.210
  - 10.10.0.211

# --- SNMP v2c ---
snmp_community: RO_DEMO
snmp_contact: "NOC noc@demo.lab"
snmp_location: "Lab Demo AAP 2.5"
snmp_trap_host: 10.10.0.220

# --- Banner MOTD (linha unica - compativel com os 3 vendors) ---
banner_text: "*** ACESSO AUTORIZADO SOMENTE - Lab Demo AAP 2.6 ***"
