---
# =============================================================================
# Cisco IOS | NTP (idempotente - resource module)
# Uso: ansible-playbook playbooks/cisco/ntp.yml
# =============================================================================
- name: "Cisco | configurar NTP servers"
  hosts: cisco
  gather_facts: false
  vars_files:
    - ../vars/servers.yml
  vars:
    _ntp_servers_list: >-
      {{ (ntp_servers | from_yaml | default([])) if (ntp_servers is string) else ntp_servers }}

  tasks:
    - name: "Cisco | NTP servers (ios_ntp_global - idempotente)"
      cisco.ios.ios_ntp_global:
        config:
          servers: "{{ _ntp_servers_list | map('community.general.dict_kv', 'server') | list }}"
        state: merged
      register: _result

    - name: "Cisco | info | NTP aplicado"
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}  ({{ 'ALTERADO' if _result.changed else 'ja estava' }})"
          - "NTP servers: {{ _ntp_servers_list }}"
