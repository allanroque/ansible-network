---
# =============================================================================
# Cisco IOS | Banner MOTD
# Uso: ansible-playbook playbooks/cisco/banner.yml
# =============================================================================
- name: "Cisco | configurar Banner MOTD"
  hosts: cisco
  gather_facts: false
  vars_files:
    - ../vars/servers.yml

  tasks:
    - name: "Cisco | ios_banner motd"
      cisco.ios.ios_banner:
        banner: motd
        text: "{{ banner_text }}"
        state: present
      register: _result

    - name: "Cisco | info | banner aplicado"
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}  ({{ 'ALTERADO' if _result.changed else 'ja estava' }})"
          - "Banner MOTD: {{ banner_text }}"
